<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Compass | 你的 AI 人生罗盘</title>
    <meta name="description" content="AI 驱动的人生规划评估工具，帮助你在职场、生活与情感中找准方向。">
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <!-- 引入 Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #a855f7;
            --background: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-blur: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            z-index: -1;
            animation: pulse 10s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .app-container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
            position: relative;
            z-index: 1;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .logo-box svg {
            width: 32px;
            height: 32px;
            fill: white;
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* 表单样式 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .glass-card {
                padding: 32px 24px;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-left: 4px;
        }

        select, input[type="range"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        select option {
            background-color: #1e293b;
            color: white;
        }

        /* 范围滑块自定义 */
        .range-container {
            padding: 10px 0;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            height: 6px;
            padding: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .btn-submit {
            grid-column: 1 / -1;
            margin-top: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            filter: grayscale(0.8);
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 加载状态 */
        .loader {
            display: none;
            text-align: center;
            margin-top: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* 结果区域 */
        #result-area {
            display: none;
            margin-top: 48px;
            padding-top: 48px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .markdown-content {
            line-height: 1.8;
            font-size: 16px;
            color: #d1d5db;
        }

        .markdown-content h2 {
            font-size: 20px;
            margin: 32px 0 16px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--primary);
            padding: 8px 20px;
            background: rgba(99, 102, 241, 0.05);
            margin: 20px 0;
            border-radius: 0 12px 12px 0;
        }

        .markdown-content ul {
            padding-left: 20px;
            margin-bottom: 20px;
        }

        .markdown-content li {
            margin-bottom: 12px;
        }

        .markdown-content strong {
            color: var(--primary-light);
        }

        /* 底部信息 */
        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 12px;
        }

        footer a {
            color: var(--primary-light);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="glass-card">
        <header>
            <div class="logo-box">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="white"/>
                    <path d="M12 15.5V18M12 18L5.21 21M12 18L18.79 21" stroke="white" stroke-width="0.5"/>
                </svg>
            </div>
            <h1>Life Compass</h1>
            <p class="subtitle">AI 智能规划，拨开迷雾，找寻人生航向</p>
        </header>

        <form id="compassForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>年龄阶段</label>
                    <select id="ageGroup">
                        <option value="20岁以下 (萌芽期)">20岁以下 (萌芽期)</option>
                        <option value="20-25岁 (探索期)">20-25岁 (探索期)</option>
                        <option value="26-30岁 (冲刺期)">26-30岁 (冲刺期)</option>
                        <option value="31-35岁 (压力期)" selected>31-35岁 (压力期)</option>
                        <option value="36-45岁 (稳重期)">36-45岁 (稳重期)</option>
                        <option value="46岁以上 (收获期)">46岁以上 (收获期)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>学历背景</label>
                    <select id="education">
                        <option value="高中及以下">高中及以下</option>
                        <option value="大专">大专</option>
                        <option value="本科" selected>本科</option>
                        <option value="硕士">硕士</option>
                        <option value="博士">博士</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>资产负债</label>
                    <select id="assets">
                        <option value="无房无车无存款">无房无车，积蓄较少</option>
                        <option value="有房贷/车贷，压力大" selected>有房/车贷，压力较大</option>
                        <option value="有资产，负债可控">有资产，负债可控</option>
                        <option value="财务自由/充裕">资产充裕 / 财务自由</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>家庭状态</label>
                    <select id="status">
                        <option value="单身">单身</option>
                        <option value="恋爱中/已婚无孩">恋爱中 / 已婚无孩</option>
                        <option value="已婚有孩 (抚育期)">已婚有孩 (抚育期)</option>
                        <option value="离异/独居">离异 / 独居</option>
                    </select>
                </div>

                <div class="input-group full">
                    <label>目前最大的痛点？</label>
                    <select id="pain">
                        <option value="职业迷茫/晋升受阻">职业迷茫 / 收入瓶颈</option>
                        <option value="家庭矛盾/情感空虚">家庭矛盾 / 情感孤独</option>
                        <option value="身心疲惫/健康焦虑">身心疲惫 / 健康焦虑</option>
                        <option value="财务压力/入不敷出">负债累累 / 财务压力</option>
                        <option value="缺乏意义感/平庸">生活平淡 / 缺乏意义感</option>
                        <option value="暂无">暂无</option>
                    </select>
                </div>

                <div class="input-group full">
                    <label>最渴望的人生愿景？</label>
                    <select id="goal">
                        <option value="事业有成/社会地位">事业有成 / 社会地位</option>
                        <option value="财富自由/提前退休">财富自由 / 环游世界</option>
                        <option value="家庭和睦/儿女成才">家庭和睦 / 岁月静好</option>
                        <option value="自我实现/精神富足">自我实现 / 精神富足</option>
                        <option value="暂无">暂无</option>
                    </select>
                </div>

                <div class="input-group full">
                    <label>当前主观幸福指数 (1-10)</label>
                    <div class="range-container">
                        <input type="range" id="happiness" min="1" max="10" value="6">
                        <div class="range-labels">
                            <span>😫 焦虑</span>
                            <span id="happinessValue">当前: 6</span>
                            <span>🤩 豁然</span>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-submit" id="submitBtn">开启人生精准导航</button>
            </div>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p class="loading-text">罗盘正在对准星辰，为您规划...</p>
        </div>

        <div id="result-area">
            <div id="markdown-content" class="markdown-content"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Life Compass | Powered by <a href="#">AI Engine</a>
    </footer>
</div>

<script>
    const API_URL = "https://vinstar1-github-io.onrender.com/api/chat";
    const happinessInput = document.getElementById('happiness');
    const happinessValue = document.getElementById('happinessValue');
    const submitBtn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('result-area');
    const markdownContent = document.getElementById('markdown-content');

    // 滑块数值显示
    happinessInput.addEventListener('input', (e) => {
        happinessValue.textContent = `当前: ${e.target.value}`;
    });

    // 调用分析
    submitBtn.addEventListener('click', async () => {
        const data = {
            age: document.getElementById('ageGroup').value,
            edu: document.getElementById('education').value,
            assets: document.getElementById('assets').value,
            status: document.getElementById('status').value,
            pain: document.getElementById('pain').value,
            goal: document.getElementById('goal').value,
            happiness: document.getElementById('happiness').value
        };

        // UI 状态
        submitBtn.disabled = true;
        loader.style.display = 'block';
        resultArea.style.display = 'none';
        markdownContent.innerHTML = '';

        const systemPrompt = `你是一位世界顶级的首席人生规划师，擅长用简洁、温暖且一针见血的语言提供建议。你的任务是根据用户画像，提供一份【人生规划评估报告】。请按Markdown格式输出，确保使用适当的 Emoji 增加阅读趣味性。内容结构如下：
        1. **🧭 现状诊断**：用3个关键词定义用户处境，并简述原因。
        2. **🪜 破局三策**：针对痛点和愿景，给出上、中、下三条具体建议。
        3. **🔮 5年推演**：不改变会怎样？改变了会怎样？
        4. **💌 能量寄语**：一句直击人心的话。`;

        const userPrompt = `用户画像：
        - 阶段：${data.age}，学历：${data.edu}。
        - 属性：${data.status}，资产负债：${data.assets}。
        - 幸福感自评：${data.happiness}/10。
        - 核心痛点：${data.pain}。
        - 理想愿景：${data.goal}。`;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userPrompt }
                    ],
                    stream: false
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || 'API 请求失败');
            }

            const json = await response.json();
            const aiText = json.choices[0].message.content;

            // 渲染与显示
            markdownContent.innerHTML = marked.parse(aiText);
            resultArea.style.display = 'block';
            
            // 平滑滚动
            setTimeout(() => {
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);

        } catch (error) {
            alert("罗盘暂故障，请稍后再试：" + error.message);
            console.error(error);
        } finally {
            submitBtn.disabled = false;
            loader.style.display = 'none';
        }
    });

    // 页面进入动画
    window.onload = () => {
        document.querySelector('.glass-card').style.opacity = '0';
        document.querySelector('.glass-card').style.transform = 'translateY(20px)';
        setTimeout(() => {
            document.querySelector('.glass-card').style.transition = 'all 0.8s ease';
            document.querySelector('.glass-card').style.opacity = '1';
            document.querySelector('.glass-card').style.transform = 'translateY(0)';
        }, 100);
    };
</script>

</body>
</html>
