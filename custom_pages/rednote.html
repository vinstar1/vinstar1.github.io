<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小红书爆款封面生成引擎</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas & JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Google Fonts for Inter & Noto Sans SC -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Noto+Sans+SC:wght@400;700;900&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #E2E8F0;
        }

        /* 自定义三层立体悬浮阴影 (符合需求) */
        .shadow-3d {
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 12px 16px -4px rgba(0, 0, 0, 0.04),
                0 24px 32px -8px rgba(0, 0, 0, 0.03);
        }

        /* 画笔高光背景特效 */
        .brush-highlight {
            position: relative;
            display: inline-block;
            z-index: 1;
        }

        .brush-highlight::before {
            content: '';
            position: absolute;
            left: -4%;
            bottom: 3px;
            width: 108%;
            height: 18px;
            background-color: #D3DAC1;
            /* 提取自原图的低饱和绿 */
            z-index: -1;
            border-radius: 8px;
            transform: rotate(-1deg);
            opacity: 0.9;
        }

        /* 隐藏滚动条让排版依然整洁 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>

<body class="min-h-screen p-8 flex justify-center items-start text-slate-800">

    <div class="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-12 gap-8">

        <!-- 左侧：工作台与控制面板 -->
        <div class="col-span-1 lg:col-span-5 bg-white p-6 rounded-2xl shadow-xl flex flex-col h-fit">
            <h1 class="text-2xl font-extrabold mb-6 flex items-center gap-2">
                <span class="text-red-500">✍️</span> 封面配置控制台
            </h1>

            <div class="space-y-5">
                <!-- 标题设置 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">主标题 (Line 1)</label>
                    <input id="input-title1" type="text"
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 transition"
                        value="为什么你的死虫式越练腰越痛？">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">副标题带高光 (Line 2)</label>
                    <input id="input-title2" type="text"
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 transition"
                        value="这3个代偿你中招了吗？">
                </div>

                <!-- 图像上传设置 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">内容配图换底</label>
                    <input id="input-image" type="file" accept="image/*"
                        class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100 transition cursor-pointer">
                    <p class="text-xs text-gray-400 mt-1">留空时将使用透明背景/默认占位，支持透明背景的PNG效果最佳。</p>
                </div>

                <!-- 卡片文案设置 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">底部说明卡片文案</label>
                    <textarea id="input-card" rows="3"
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 transition resize-none">明明是练核心，结果练完腰酸脖子痛？😩&#10;结合 Femur Arcs和 Dead Bug，图解说&#10;明告诉大家最容易犯的错！</textarea>
                </div>
            </div>

            <!-- 操作按钮 -->
            <hr class="my-6 border-slate-100">
            <div class="flex gap-4">
                <button onclick="exportToZip()"
                    class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-red-500/30 transition transform hover:-translate-y-0.5 active:translate-y-0">
                    📸 一键打包下载 ZIP
                </button>
            </div>
            <p class="text-xs text-slate-400 text-center mt-3">采用 html2canvas 将以 @2x 高清尺寸捕获内容</p>
        </div>

        <!-- 右侧：实时渲染预览区 -->
        <div class="col-span-1 lg:col-span-7 flex justify-center items-center">

            <!-- 小红书 3:4 画布容器 600x800 -->
            <div id="poster-capture-area" class="relative overflow-hidden shrink-0 flex flex-col justify-between"
                style="width: 600px; height: 800px; background-color: #FAF8F2;">

                <!-- 顶部文案区 -->
                <div class="pt-16 px-10 text-center select-none">
                    <h2 id="view-title1" class="text-[38px] font-[900] text-[#1A1A1A] leading-tight tracking-tight">
                        为什么你的死虫式越练腰越痛？
                    </h2>
                    <div class="mt-4">
                        <span id="view-title2"
                            class="brush-highlight text-[34px] font-[800] text-[#1A1A1A] tracking-tight">
                            这3个代偿你中招了吗？
                        </span>
                    </div>
                </div>

                <!-- 中间图片区 -->
                <div class="flex-1 relative flex justify-center items-center w-full px-8 my-4">
                    <div id="img-placeholder"
                        class="w-full h-full flex items-center justify-center text-gray-300 border-2 border-dashed border-gray-300 rounded-xl">
                        [ 等待上传配图 ]
                    </div>
                    <img id="view-image" src="" alt="主体图"
                        class="absolute max-h-full max-w-full object-contain hidden" />
                </div>

                <!-- 底部说明卡片 -->
                <div class="px-8 pb-12 w-full">
                    <div class="shadow-3d rounded-[24px] px-8 py-8" style="background-color: #E6DCCD;">
                        <!-- 为了让包含英文字符也能有较好表现，赋予字体并进行行高调节 -->
                        <p id="view-card"
                            class="text-[20px] leading-[1.8] font-semibold tracking-wide whitespace-pre-wrap"
                            style="color: #5C4636;"></p>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- 数据绑定与生成逻辑 -->
    <script>
        // 提取 DOM 元素
        const inputs = {
            title1: document.getElementById('input-title1'),
            title2: document.getElementById('input-title2'),
            card: document.getElementById('input-card'),
            image: document.getElementById('input-image')
        };
        const views = {
            title1: document.getElementById('view-title1'),
            title2: document.getElementById('view-title2'),
            card: document.getElementById('view-card'),
            image: document.getElementById('view-image'),
            placeholder: document.getElementById('img-placeholder')
        };

        // 初始同步多行文本
        views.card.innerText = inputs.card.value;

        // 实时数据绑定
        inputs.title1.addEventListener('input', (e) => views.title1.innerText = e.target.value);
        inputs.title2.addEventListener('input', (e) => views.title2.innerText = e.target.value);
        inputs.card.addEventListener('input', (e) => views.card.innerText = e.target.value);

        // 处理图像本地预览
        inputs.image.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    views.image.src = event.target.result;
                    views.image.classList.remove('hidden');
                    views.placeholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            } else {
                views.image.src = '';
                views.image.classList.add('hidden');
                views.placeholder.classList.remove('hidden');
            }
        });

        // 导出并打包下载函数
        async function exportToZip() {
            const exportDataBtn = event.currentTarget;
            const originalText = exportDataBtn.innerHTML;
            exportDataBtn.innerHTML = '⏳ 正在渲染图形层...';
            exportDataBtn.disabled = true;

            try {
                const node = document.getElementById('poster-capture-area');

                // 执行 Html2Canvas 渲染 (scale: 2 增强清晰度)
                const canvas = await html2canvas(node, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#FAF8F2' // 同步底色
                });

                exportDataBtn.innerHTML = '📦 正在打包ZIP...';

                // 转Blob并用JSZip压缩
                canvas.toBlob(async (blob) => {
                    if (!blob) throw new Error('Canvas 转 Blob 失败');

                    const zip = new JSZip();
                    // 这里如果实现了多页逻辑可循环向 folder 压入
                    zip.file("cover_01.png", blob);

                    const zipContent = await zip.generateAsync({ type: "blob" });

                    // 模拟触发下载
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(zipContent);
                    // 动态命名
                    a.download = `小红书封面_${new Date().getTime()}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(a.href);

                    // 恢复按钮状态
                    exportDataBtn.innerHTML = originalText;
                    exportDataBtn.disabled = false;
                }, 'image/png');

            } catch (error) {
                console.error("生成报错: ", error);
                alert("渲染失败，请检查浏览器权限及控制台报错");
                exportDataBtn.innerHTML = originalText;
                exportDataBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
