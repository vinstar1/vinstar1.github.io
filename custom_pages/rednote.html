<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小红书爆款封面与图文生成引擎</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas & JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Alpine.js (Lightweight State Management) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"></script>
    <!-- Google Fonts for Inter & Noto Sans SC -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Noto+Sans+SC:wght@400;700;900&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #E2E8F0;
        }

        /* 自定义三层立体悬浮阴影 (符合需求) */
        .shadow-3d {
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 12px 16px -4px rgba(0, 0, 0, 0.04),
                0 24px 32px -8px rgba(0, 0, 0, 0.03);
        }

        /* 画笔高光背景特效 */
        .brush-highlight {
            position: relative;
            display: inline-block;
            z-index: 1;
        }

        .brush-highlight::before {
            content: '';
            position: absolute;
            left: -4%;
            bottom: 3px;
            width: 108%;
            height: 48%; /* 随着字号等比例高度 */
            background-color: #D3DAC1;
            /* 提取自原图的低饱和绿 */
            z-index: -1;
            border-radius: 8px;
            transform: rotate(-1deg);
            opacity: 0.9;
        }

        /* 隐藏滚动条让排版依然整洁 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        
        /* 屏蔽导出隐藏区的交互但保证可被截图 */
        #export-layer {
            position: absolute;
            left: -9999px;
            top: 0;
            opacity: 1;
            pointer-events: none;
        }
    </style>
</head>

<body class="min-h-screen p-8 flex justify-center items-start text-slate-800" x-data="coverApp()">

    <div class="max-w-screen-2xl w-full grid grid-cols-1 lg:grid-cols-12 gap-8 relative">

        <!-- 左侧：工作台与控制面板 -->
        <div class="col-span-1 lg:col-span-5 bg-white p-6 rounded-2xl shadow-xl flex flex-col h-fit">
            
            <h1 class="text-2xl font-extrabold mb-4 flex items-center justify-between">
                <span class="flex items-center gap-2 text-red-600"><span class="text-2xl">✍️</span> 创作控制台</span>
            </h1>

            <!-- 画布尺寸设置 -->
            <div class="mb-5 p-4 bg-gray-50 rounded-xl border border-gray-100 flex flex-col gap-3">
                <div class="flex items-center justify-between gap-4">
                    <div class="flex flex-col gap-1 w-1/2">
                        <label class="text-xs font-bold text-gray-500">画布宽度 (px)</label>
                        <input type="number" x-model.number="canvasWidth" class="w-full px-3 py-1.5 border border-gray-200 rounded text-sm focus:outline-none focus:border-red-400">
                    </div>
                    <div class="flex flex-col gap-1 w-1/2">
                        <label class="text-xs font-bold text-gray-500">画布高度 (px)</label>
                        <input type="number" x-model.number="canvasHeight" class="w-full px-3 py-1.5 border border-gray-200 rounded text-sm focus:outline-none focus:border-red-400">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button @click="setPreset(600, 800)" class="text-[11px] px-2 py-1 rounded bg-slate-200 text-slate-700 hover:bg-slate-300 transition">小红书 3:4</button>
                    <button @click="setPreset(800, 800)" class="text-[11px] px-2 py-1 rounded bg-slate-200 text-slate-700 hover:bg-slate-300 transition">正方形 1:1</button>
                    <button @click="setPreset(960, 540)" class="text-[11px] px-2 py-1 rounded bg-slate-200 text-slate-700 hover:bg-slate-300 transition">宽屏 16:9</button>
                </div>
            </div>

            <!-- 页面管理 Tabs -->
            <div class="flex gap-2 mb-6 overflow-x-auto pb-2 items-center">
                <template x-for="(page, index) in pages" :key="page.id">
                    <button @click="currentIndex = index"
                        :class="currentIndex === index ? 'bg-red-500 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                        class="px-4 py-2 rounded-lg font-bold text-sm transition shrink-0 whitespace-nowrap flex items-center gap-1">
                        <span x-text="page.type === 'cover' ? '封面' : '正文 ' + index"></span>
                        <template x-if="page.type !== 'cover'">
                           <span @click.stop="deletePage(index)" class="ml-2 hover:text-red-300 text-gray-300" title="删除该页">✕</span>
                        </template>
                    </button>
                </template>
                <button @click="addContentPage()" class="px-3 py-2 rounded-lg border border-dashed border-gray-400 text-gray-500 hover:bg-gray-50 font-bold text-sm shrink-0">
                    + 新增正文页
                </button>
            </div>

            <!-- 表单配制区：绑定到当前选中页面 -->
            <div class="space-y-5" x-show="currentPage">
                
                <!-- 主标题 (涵盖封面与正文的不同模式) -->
                <div>
                    <label class="block items-center justify-between text-sm font-bold text-gray-700 mb-1">
                        <span x-text="currentPage.type === 'cover' ? '主标题 (Line 1)' : '正文主标题'"></span>
                    </label>
                    <textarea x-model="currentPage.title1" rows="2"
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 transition resize-none"></textarea>
                    
                    <div class="flex items-center gap-3 mt-1">
                        <span class="text-xs text-gray-400 w-12 text-right border-r pr-2 border-gray-200" x-text="currentPage.title1Size + 'px'"></span>
                        <input type="range" x-model="currentPage.title1Size" min="16" max="64" step="1" class="flex-1 accent-red-500 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>

                <!-- 副标题带高光 (仅封面显示) -->
                <div x-show="currentPage.type === 'cover'">
                    <label class="block text-sm font-bold text-gray-700 mb-1">副标题带高光 (Line 2)</label>
                    <textarea x-model="currentPage.title2" rows="2"
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 transition resize-none"></textarea>
                    <div class="flex items-center gap-3 mt-1">
                        <span class="text-xs text-gray-400 w-12 text-right border-r pr-2 border-gray-200" x-text="currentPage.title2Size + 'px'"></span>
                        <input type="range" x-model="currentPage.title2Size" min="16" max="64" step="1" class="flex-1 accent-red-500 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>

                <!-- 图像上传设置 -->
                <div class="p-4 bg-slate-50 border border-slate-100 rounded-xl relative">
                    <label class="block text-sm font-bold text-gray-700 mb-2">配图设置</label>
                    <input type="file" accept="image/*" @change="handleImageUpload($event, currentPage)"
                        class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100 transition cursor-pointer mb-2">
                    
                    <!-- remove.bg 自动抠图开关 -->
                    <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-slate-700 user-select-none mt-3 p-2 bg-white rounded-lg border border-slate-200">
                        <input type="checkbox" x-model="enableAI" class="w-4 h-4 text-red-600 rounded bg-gray-100 border-gray-300 focus:ring-red-500">
                        ✨ 启用 remove.bg 自动抠图 <span class="text-[10px] text-gray-400 ml-auto">(效果最佳/需联网)</span>
                    </label>

                    <button x-show="currentPage.image" @click="currentPage.image = ''" class="text-xs text-red-500 hover:text-red-700 mt-2 font-semibold">移除配图清空插槽</button>
                    
                    <!-- 抠图动画遮罩 -->
                    <div x-show="processingImage" class="absolute inset-0 bg-white/80 rounded-xl flex items-center justify-center backdrop-blur-sm z-10 transition">
                         <div class="text-sm font-bold text-red-500 flex items-center gap-2 animate-pulse">
                            ⏳ 正在通过 remove.bg 抠图...
                         </div>
                    </div>
                </div>

                <!-- 卡片文案设置 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">
                        <span x-text="currentPage.type === 'cover' ? '底部说明卡片文案' : '正文排版内容'"></span>
                    </label>
                    <!-- 根据页面的内容类型赋予不同大小的基础框 -->
                    <textarea x-model="currentPage.cardContent" :rows="currentPage.type === 'cover' ? 4 : 8"
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 transition resize-none"></textarea>
                    
                    <div class="flex items-center gap-3 mt-1">
                        <span class="text-xs text-gray-400 w-12 text-right border-r pr-2 border-gray-200" x-text="currentPage.cardSize + 'px'"></span>
                        <input type="range" x-model="currentPage.cardSize" min="12" max="50" step="1" class="flex-1 accent-red-500 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <hr class="my-6 border-slate-100">
            <div class="flex gap-4">
                <button @click="exportToZip" :disabled="exporting"
                    :class="exporting ? 'bg-gray-400 cursor-not-allowed' : 'bg-red-600 hover:bg-red-700 active:translate-y-0 transform hover:-translate-y-0.5'"
                    class="flex-1 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-red-500/30 transition flex justify-center items-center">
                    <span x-text="exportBtnText"></span>
                </button>
            </div>
            <p class="text-[11px] text-slate-400 text-center mt-3">导出后支持自动打包 <span class="font-bold text-slate-600" x-text="pages.length"></span> 张高清图片 (ZIP)</p>
        </div>

        <!-- 右侧：实时渲染预览区 (使用统一的预览显示器) -->
        <div class="col-span-1 lg:col-span-7 flex justify-center items-center relative overflow-hidden">

            <!-- 动态渲染当前选中的页面 -->
            <template x-if="currentPage">
               <div class="shadow-2xl rounded-sm ring-1 ring-black/5" style="border-radius: 4px; overflow: hidden;">
                   <!-- 使用公用组件插入，用 x-html 或将内部写在独立作用域。这里直接用条件分支分别套用模板 -->
                   <template x-if="currentPage.type === 'cover'">
                       <!-- 封面模板 -->
                       <div class="relative overflow-hidden shrink-0 flex flex-col justify-between user-select-none" :style="`width: ${canvasWidth}px; height: ${canvasHeight}px; background-color: #FAF8F2;`">
                           <!-- 顶部文案区 -->
                           <div class="pt-16 px-10 text-center select-none z-10">
                               <h2 class="font-[900] text-[#1A1A1A] leading-tight tracking-tight whitespace-pre-wrap break-words"
                                   :style="`font-size: ${currentPage.title1Size}px`" x-text="currentPage.title1"></h2>
                               <div class="mt-4" x-show="currentPage.title2.trim() !== ''">
                                   <span class="brush-highlight font-[800] text-[#1A1A1A] tracking-tight whitespace-pre-wrap break-words inline-block"
                                       :style="`font-size: ${currentPage.title2Size}px`" x-text="currentPage.title2"></span>
                               </div>
                           </div>
                           <!-- 中间图片区 -->
                           <div class="flex-1 relative flex justify-center items-center w-full px-8 my-4 z-0">
                               <template x-if="!currentPage.image">
                                   <div class="w-full h-full flex items-center justify-center text-gray-300 border-2 border-dashed border-gray-300 rounded-xl">
                                       [ 等待上传配图 ]
                                   </div>
                               </template>
                               <template x-if="currentPage.image">
                                   <img :src="currentPage.image" class="absolute max-h-full max-w-full object-contain" />
                               </template>
                           </div>
                           <!-- 底部说明卡片 -->
                           <div class="px-8 pb-12 w-full z-10" x-show="currentPage.cardContent.trim() !== ''">
                               <div class="shadow-3d rounded-[24px] px-8 py-8" style="background-color: #E6DCCD;">
                                   <p class="leading-[1.8] font-semibold tracking-wide whitespace-pre-wrap break-words"
                                       style="color: #5C4636;"
                                       :style="`font-size: ${currentPage.cardSize}px`" x-text="currentPage.cardContent"></p>
                               </div>
                           </div>
                       </div>
                   </template>
                   
                   <template x-if="currentPage.type === 'content'">
                       <!-- 正文模板 -->
                       <div class="relative overflow-hidden shrink-0 flex flex-col justify-start user-select-none" :style="`width: ${canvasWidth}px; height: ${canvasHeight}px; background-color: #FAF8F2;`">
                           <!-- 顶部带个简单的留白与横线和精悍标题 -->
                           <template x-if="currentPage.title1.trim() !== ''">
                               <div class="pt-12 px-10 select-none pb-4 relative">
                                   <h2 class="font-[900] text-[#1A1A1A] leading-tight tracking-tight whitespace-pre-wrap text-center"
                                       :style="`font-size: ${currentPage.title1Size}px`" x-text="currentPage.title1"></h2>
                                   <div class="absolute bottom-0 left-10 right-10 h-[2px] bg-gray-200"></div>
                               </div>
                           </template>
                           
                           <!-- 占屏较大的图片，类似插画或小图解 -->
                           <template x-if="currentPage.image">
                               <div class="relative flex justify-center w-full px-8 mt-6 shrink-0 z-0" :class="currentPage.cardContent.trim() === '' ? 'flex-1 mb-8' : 'max-h-[40%]'">
                                    <div class="w-full h-full relative overflow-hidden flex items-center justify-center">
                                       <img :src="currentPage.image" class="max-w-full max-h-full object-contain" />
                                    </div>
                               </div>
                           </template>
                       
                           <!-- 下方长正文区 -->
                           <div class="px-10 py-8 w-full flex-1 overflow-hidden flex flex-col z-10">
                                <p class="leading-[1.9] text-[#2c2c2c] font-[500] tracking-wide whitespace-pre-wrap break-words"
                                   :style="`font-size: ${currentPage.cardSize}px`" x-text="currentPage.cardContent"></p>
                           </div>
                       </div>
                   </template>
               </div>
            </template>

        </div>
    </div><!-- End of main Grid -->

    <!-- ============================================== -->
    <!-- 后台隐藏 DOM - 用于生成 ZIP（不受当前交互页影响，将全部页面渲染出来方便截图） -->
    <!-- ============================================== -->
    <div id="export-layer">
        <template x-for="(page, index) in pages" :key="page.id">
            <!-- 给定特定 ID 方便遍历使用 html2canvas 提取 -->
            <div :id="'canvas-page-' + index" class="mb-4">
                 
                 <!-- 对应封面版 -->
                 <template x-if="page.type === 'cover'">
                    <div class="relative overflow-hidden shrink-0 flex flex-col justify-between" :style="`width: ${canvasWidth}px; height: ${canvasHeight}px; background-color: #FAF8F2;`">
                        <!-- 顶部文案区 -->
                        <div class="pt-16 px-10 text-center select-none z-10">
                            <h2 class="font-[900] text-[#1A1A1A] leading-tight tracking-tight whitespace-pre-wrap break-words"
                                :style="`font-size: ${page.title1Size}px`" x-text="page.title1"></h2>
                            <div class="mt-4" x-show="page.title2 && page.title2.trim() !== ''">
                                <span class="brush-highlight inline-block font-[800] text-[#1A1A1A] tracking-tight whitespace-pre-wrap break-words"
                                    :style="`font-size: ${page.title2Size}px`" x-text="page.title2"></span>
                            </div>
                        </div>
                        <!-- 中间图片区 -->
                        <div class="flex-1 relative flex justify-center items-center w-full px-8 my-4 z-0">
                            <template x-if="page.image">
                                <img :src="page.image" class="absolute max-h-full max-w-full object-contain" />
                            </template>
                        </div>
                        <!-- 底部说明卡片 -->
                        <div class="px-8 pb-12 w-full z-10" x-show="page.cardContent && page.cardContent.trim() !== ''">
                            <div class="shadow-3d rounded-[24px] px-8 py-8" style="background-color: #E6DCCD;">
                                <p class="leading-[1.8] font-semibold tracking-wide whitespace-pre-wrap break-words"
                                    style="color: #5C4636;"
                                    :style="`font-size: ${page.cardSize}px`" x-text="page.cardContent"></p>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- 对应正文版 -->
                 <template x-if="page.type === 'content'">
                    <div class="relative overflow-hidden shrink-0 flex flex-col justify-start" :style="`width: ${canvasWidth}px; height: ${canvasHeight}px; background-color: #FAF8F2;`">
                        <template x-if="page.title1 && page.title1.trim() !== ''">
                            <div class="pt-12 px-10 select-none pb-4 relative">
                                <h2 class="font-[900] text-[#1A1A1A] leading-tight tracking-tight whitespace-pre-wrap text-center"
                                    :style="`font-size: ${page.title1Size}px`" x-text="page.title1"></h2>
                                <div class="absolute bottom-0 left-10 right-10 h-[2px] bg-gray-200"></div>
                            </div>
                        </template>
                        
                        <template x-if="page.image">
                            <div class="relative flex justify-center w-full px-8 mt-6 shrink-0 z-0" :class="(page.cardContent && page.cardContent.trim() === '') ? 'flex-1 mb-8' : 'max-h-[40%]'">
                                 <div class="w-full h-full relative overflow-hidden flex items-center justify-center">
                                    <img :src="page.image" class="max-w-full max-h-full object-contain" />
                                 </div>
                            </div>
                        </template>
                    
                        <div class="px-10 py-8 w-full flex-1 overflow-hidden flex flex-col z-10">
                             <p class="leading-[1.9] text-[#2c2c2c] font-[500] tracking-wide whitespace-pre-wrap break-words"
                                :style="`font-size: ${page.cardSize}px`" x-text="page.cardContent"></p>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>
    <!-- ============================================== -->

    <!-- 逻辑区块 -->
    <script>
        function coverApp() {
            return {
                canvasWidth: 600,
                canvasHeight: 800,
                pages: [
                    {
                        id: Date.now(),
                        type: 'cover',
                        title1: '为什么你的死虫式\n越练腰越痛？',
                        title1Size: 38,
                        title2: '这3个代偿你中招了吗？',
                        title2Size: 32,
                        image: '',
                        cardContent: '明明是练核心，结果练完腰酸脖子痛？😩\n结合 Femur Arcs和 Dead Bug，图解说\n明告诉大家最容易犯的错！',
                        cardSize: 20
                    }
                ],
                currentIndex: 0,
                enableAI: false,
                processingImage: false,
                exporting: false,
                exportBtnText: '📸 一键打包下载全部画面',

                get currentPage() {
                    return this.pages[this.currentIndex];
                },

                setPreset(w, h) {
                    this.canvasWidth = w;
                    this.canvasHeight = h;
                },

                addContentPage() {
                    this.pages.push({
                        id: Date.now() + Math.random(),
                        type: 'content',
                        title1: '动作易错点解析',
                        title1Size: 28,
                        title2: '', // 正文模板用不到高光副标题，但预留以免报错
                        title2Size: 0,
                        image: '',
                        cardContent: '这是你的正文模板区。\n\n你可以把一些图文分段放在下面，调整一个适合的字号。支持回车排版。\n如果需要加入更多说明正文或是图解，都可以直接操作。',
                        cardSize: 18
                    });
                    this.currentIndex = this.pages.length - 1;
                },

                deletePage(index) {
                    if (confirm('确认删除这一页的正文吗？')) {
                        this.pages.splice(index, 1);
                        if (this.currentIndex >= this.pages.length) {
                            this.currentIndex = this.pages.length - 1;
                        }
                    }
                },

                async handleImageUpload(e, page) {
                    const file = e.target.files[0];
                    if (!file) {
                        page.image = '';
                        return;
                    }

                    if (this.enableAI) {
                        this.processingImage = true;
                        try {
                            const apiKey = 'Sa9RGgbKfTqC1UG8Q8oZbY7B';
                            const formData = new FormData();
                            formData.append('image_file', file);
                            formData.append('size', 'auto');

                            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                                method: 'POST',
                                headers: { 'X-Api-Key': apiKey },
                                body: formData
                            });

                            if (!response.ok) {
                                const errorData = await response.json();
                                throw new Error(errorData.errors?.[0]?.title || 'API 请求失败');
                            }

                            const resultBlob = await response.blob();
                            page.image = URL.createObjectURL(resultBlob);
                        } catch (err) {
                            console.error("remove.bg 抠图失败:", err);
                            alert("抠图失败，可能由于 API 剩余额度不足或网络原因。错误：" + err.message);
                            page.image = URL.createObjectURL(file);
                        } finally {
                            this.processingImage = false;
                        }
                    } else {
                        // 常规原版原图上传
                        const url = URL.createObjectURL(file);
                        page.image = url;
                    }
                    // Reset input 以便重复上传同文件可再响应Change
                    e.target.value = '';
                },

                async exportToZip() {
                    this.exporting = true;
                    this.exportBtnText = '⏳ 准备渲染图形...';

                    try {
                        // 确保所有的 DOM 在 alpine 处理完毕渲染之后被捕获
                        await this.$nextTick();
                        
                        const zip = new JSZip();

                        for (let i = 0; i < this.pages.length; i++) {
                            const page = this.pages[i];
                            const domNode = document.getElementById('canvas-page-' + i);
                            
                            this.exportBtnText = `正在捕获 P${i+1} / ${this.pages.length}...`;
                            
                            const canvas = await html2canvas(domNode, {
                                scale: 2, // 确保导出质量足够清晰
                                useCORS: true,
                                backgroundColor: '#FAF8F2',
                                // 修正一些可能影响到文字垂直高度排版的差异
                                onclone: (clonedDoc) => {
                                    // Make sure fonts are properly loaded in the clone
                                }
                            });

                            // 转为 Blob
                            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                            if (!blob) throw new Error(`渲染 P${i+1} 失败`);
                            
                            // 决定文件命名
                            const fileName = page.type === 'cover' ? '01_Cover.png' : `P${i+1}_Content.png`;
                            zip.file(fileName, blob);
                        }

                        this.exportBtnText = '📦 正在将文件压缩为 ZIP...';
                        const zipContent = await zip.generateAsync({ type: "blob" });

                        // 模拟触发下载
                        const a = document.createElement("a");
                        a.href = URL.createObjectURL(zipContent);
                        const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                        a.download = `小红书套图_${stamp}.zip`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(a.href);

                    } catch (error) {
                         console.error("生成报错: ", error);
                         alert("有一部分卡片渲染失败。请查看浏览器控制台错误。");
                    } finally {
                         this.exporting = false;
                         this.exportBtnText = '📸 一键打包下载全部画面';
                    }
                }
            }
        }
    </script>
</body>

</html>
